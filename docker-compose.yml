services:
  # 1. Database
  db:
    image: postgres:15
    container_name: praxisml_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: praxisml_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init-mlflow-db.sh:/docker-entrypoint-initdb.d/init-mlflow-db.sh:ro
    restart: always
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 5s
      timeout: 5s
      retries: 5

  # 2. Cache & Message Broker
  redis:
    image: redis:7
    container_name: praxisml_redis
    ports:
      - "6379:6379"
    restart: always

  # 3. Experiment Tracking
  mlflow:
    image: ghcr.io/mlflow/mlflow:v3.10.0
    container_name: mlflow_server
    ports:
      - "5000:5000"
    volumes:
      - ./backend/data:/app/data
    environment:
      - MLFLOW_SERVER_ALLOWED_HOSTS=*
      # Credenciales de S3 para hablar con MinIO (los mismos que MINIO_ROOT_USER)
      - AWS_ACCESS_KEY_ID=minioadmin
      - AWS_SECRET_ACCESS_KEY=minioadmin
      # Endpoint explícito para boto3 (necesario porque no es AWS real)
      - AWS_ENDPOINT_URL_S3=http://minio:9000
    depends_on:
      - minio
    command: >
      sh -c "pip install psycopg2-binary boto3 && mlflow server
      --backend-store-uri postgresql://mlflow:mlflow@db:5432/mlflow_db
      --default-artifact-root s3://praxisml/mlruns
      --serve-artifacts
      --host 0.0.0.0
      --port 5000"
    restart: always
  # 4. Object Storage — MinIO (self-hosted S3-compatible)
  minio:
    image: minio/minio:latest
    container_name: praxisml_minio
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # MinIO Console UI
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:9000/minio/health/live" ]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always

  # 4b. MinIO Initialization (creates the default bucket)
  minio-init:
    image: minio/mc:latest
    container_name: praxisml_minio_init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      /usr/bin/mc alias set myminio http://minio:9000 minioadmin minioadmin;
      /usr/bin/mc mb myminio/praxisml || true;
      /usr/bin/mc mb myminio/praxisml-dvc || true;
      exit 0;
      "
  # 5. FastAPI Backend
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: praxisml_api
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
      mlflow:
        condition: service_started
      minio:
        condition: service_healthy
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/praxisml_db
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - MLFLOW_TRACKING_URI=http://mlflow:5000
      - STORAGE_BACKEND=minio
      - MINIO_ENDPOINT=http://minio:9000
      - AWS_ACCESS_KEY_ID=minioadmin
      - AWS_SECRET_ACCESS_KEY=minioadmin
      - AWS_ENDPOINT_URL_S3=http://minio:9000
    ports:
      - "8000:8000"
    volumes:
      - ./backend/app:/app/app
      - ./backend/MRI:/app/MRI
      - ./backend/models:/app/models
      - ./backend/data:/app/data
      - ./backend/migrations:/app/migrations
    restart: always

  # 6. Celery Worker
  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: praxisml_worker
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
      minio:
        condition: service_healthy
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/praxisml_db
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - MLFLOW_TRACKING_URI=http://mlflow:5000
      - STORAGE_BACKEND=minio
      - MINIO_ENDPOINT=http://minio:9000
      - AWS_ACCESS_KEY_ID=minioadmin
      - AWS_SECRET_ACCESS_KEY=minioadmin
      - AWS_ENDPOINT_URL_S3=http://minio:9000
    command: [ "uv", "run", "celery", "-A", "app.worker.celery_app", "worker", "--loglevel=info", "--pool=solo" ]
    volumes:
      - ./backend/app:/app/app
      - ./backend/MRI:/app/MRI
      - ./backend/models:/app/models
      - ./backend/data:/app/data
      - ./backend/migrations:/app/migrations
    restart: always

  # 7. Frontend
  frontend:
    build:
      context: ./frontend/frontend
      dockerfile: Dockerfile
    container_name: praxisml_frontend
    depends_on:
      - api
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://api:8000
    restart: always

  # 8. Prometheus — scraping de métricas
  prometheus:
    image: prom/prometheus:latest
    container_name: praxisml_prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.enable-lifecycle"
    restart: always

  # 9. Grafana — dashboards
  grafana:
    image: grafana/grafana:latest
    container_name: praxisml_grafana
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_data:/var/lib/grafana
      - ./infra/grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus
    restart: always

volumes:
  postgres_data:
  minio_data:
  prometheus_data:
  grafana_data:
