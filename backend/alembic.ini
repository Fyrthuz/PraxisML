# Alembic configuration — PraxisML Backend
# Documentación: https://alembic.sqlalchemy.org/en/latest/tutorial.html

[alembic]
# Carpeta donde Alembic almacena las migraciones
script_location = migrations

# Plantilla para los nombres de los archivos de migración
# Ejemplo: 20260307_1200_add_user_role.py
file_template = %%(year)d%%(month)02d%%(day)02d_%%(hour)02d%%(minute)02d_%%(slug)s

# Timezone para los timestamps de las migraciones
timezone = UTC

# DATABASE_URL se inyecta en env.py desde app.core.config — NO se pone aquí
# para no duplicar credenciales.
sqlalchemy.url =

[post_write_hooks]
# (vacío — sin hooks post-escritura)

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
